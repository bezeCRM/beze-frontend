name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run Expo Lint
        run: npm run lint -- --max-warnings=0

      - name: 🔎 Type check
        run: npm run type-check

      - name: 🧱 Expo dry build (optional)
        run: npx expo export --output-dir=dist || true
